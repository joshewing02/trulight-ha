##############################################################################
# TruLight BLE Proxy - ESPHome ESP32 Configuration
#
# Flash this to an ESP32-S3 (or any ESP32 with BLE) to proxy commands
# to a TruLight Pro controller over Bluetooth Low Energy.
#
# Before flashing, update the substitutions below:
#   device_name:   ESPHome device name (e.g., trulight-backyard)
#   friendly_name: Human-readable name (e.g., TruLight Backyard)
#   trulight_mac:  BLE MAC address of your TruLight controller
#
# To find the MAC address, temporarily set trulight_mac to "00:00:00:00:00:00"
# and enable the BLE scan logger (uncomment the on_ble_advertise section below).
# Look for "TruLight Pro" in the ESPHome logs.
#
# Required secrets.yaml entries:
#   api_key: "your-base64-api-encryption-key"
#   ota_password: "your-ota-password"
#   wifi_ssid: "YourSSID"
#   wifi_password: "YourPassword"
#
# Generate an API key with: openssl rand -base64 32
# Generate an OTA password with: openssl rand -hex 16
##############################################################################

substitutions:
  device_name: trulight-backyard
  friendly_name: TruLight Backyard
  trulight_mac: "AA:BB:CC:DD:EE:FF"  # Replace with your TruLight BLE MAC

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-s3-devkitc-1
  # Board variants:
  #   Waveshare ESP32-S3 Mini:  esp32-s3-devkitc-1
  #   ESP32-S3 DevKitC:         esp32-s3-devkitc-1
  #   ESP32 DevKit v1 (no S3):  esp32dev  (BLE 4.2, shorter range)
  framework:
    type: arduino

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${device_name}-fallback"

captive_portal:

esp32_ble_tracker:
  scan_parameters:
    active: true
    interval: 320ms
    window: 120ms
  # Uncomment below to scan for TruLight controllers (find MAC address)
  # on_ble_advertise:
  #   - then:
  #       - lambda: |-
  #           std::string name = x.get_name();
  #           if (name.length() > 0) {
  #             ESP_LOGI("ble_scan", "Device: %s  MAC: %s  RSSI: %d",
  #               name.c_str(), x.address_str().c_str(), x.get_rssi());
  #           }

ble_client:
  - mac_address: ${trulight_mac}
    id: trulight_client
    auto_connect: true
    on_connect:
      then:
        - lambda: 'ESP_LOGI("trulight", "BLE connected to TruLight controller");'
    on_disconnect:
      then:
        - lambda: 'ESP_LOGW("trulight", "BLE disconnected from TruLight controller");'

globals:
  - id: trulight_power_state
    type: bool
    restore_value: no
    initial_value: "false"

# Command text entity - HA sends hex strings here, ESP32 adds CRC and writes to BLE
text:
  - platform: template
    name: "${friendly_name} Command"
    id: trulight_command
    optimistic: true
    min_length: 4
    max_length: 220
    mode: text
    on_value:
      then:
        - ble_client.ble_write:
            id: trulight_client
            service_uuid: 0000ae00-0000-1000-8000-00805f9b34fb
            characteristic_uuid: 0000ae01-0000-1000-8000-00805f9b34fb
            value: !lambda |-
              std::string hex = x;
              // Validate: must start with "AA", even length, only hex chars
              if (hex.length() < 4 || hex.length() % 2 != 0) {
                ESP_LOGW("trulight", "Invalid hex: length %d (need even, min 4)", hex.length());
                return {};
              }
              if (hex[0] != 'A' || hex[1] != 'A') {
                ESP_LOGW("trulight", "Invalid hex: must start with AA");
                return {};
              }
              std::vector<uint8_t> data;
              for (size_t i = 0; i + 1 < hex.length(); i += 2) {
                uint8_t b = 0;
                bool valid = true;
                for (int j = 0; j < 2; j++) {
                  char c = hex[i + j];
                  b <<= 4;
                  if (c >= '0' && c <= '9') b |= (c - '0');
                  else if (c >= 'a' && c <= 'f') b |= (c - 'a' + 10);
                  else if (c >= 'A' && c <= 'F') b |= (c - 'A' + 10);
                  else { valid = false; break; }
                }
                if (!valid) {
                  ESP_LOGW("trulight", "Invalid hex char at position %d", i);
                  return {};
                }
                data.push_back(b);
              }
              // CRC8-MAXIM (Dallas/Maxim 1-Wire polynomial 0x8C)
              uint8_t crc = 0;
              for (auto byte : data) {
                crc ^= byte;
                for (int i = 0; i < 8; i++) {
                  if (crc & 1) crc = (crc >> 1) ^ 0x8C;
                  else crc >>= 1;
                }
              }
              data.push_back(crc);
              ESP_LOGI("trulight", "Sending %d bytes, CRC=0x%02X", data.size(), crc);
              return data;

# Power buttons - pre-built commands for convenience
button:
  - platform: template
    name: "${friendly_name} Power On"
    on_press:
      - ble_client.ble_write:
          id: trulight_client
          service_uuid: 0000ae00-0000-1000-8000-00805f9b34fb
          characteristic_uuid: 0000ae01-0000-1000-8000-00805f9b34fb
          value: [0xAA, 0xF1, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x2E]

  - platform: template
    name: "${friendly_name} Power Off"
    on_press:
      - ble_client.ble_write:
          id: trulight_client
          service_uuid: 0000ae00-0000-1000-8000-00805f9b34fb
          characteristic_uuid: 0000ae01-0000-1000-8000-00805f9b34fb
          value: [0xAA, 0xF1, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x6D]

  - platform: restart
    name: "${friendly_name} Restart"

sensor:
  - platform: wifi_signal
    name: "${friendly_name} WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "${friendly_name} Uptime"

  # BLE notify listener - receives power state responses from controller
  - platform: ble_client
    type: characteristic
    ble_client_id: trulight_client
    service_uuid: 0000ae00-0000-1000-8000-00805f9b34fb
    characteristic_uuid: 0000ae02-0000-1000-8000-00805f9b34fb
    notify: true
    id: trulight_notify
    lambda: |-
      if (x.size() > 2 && x[0] == 0xBB) {
        uint8_t opcode = x[1];
        if ((opcode == 0xB6 || opcode == 0xFC) && x.size() > 5) {
          bool power = (x[2] != 0);
          id(trulight_power_state) = power;
          ESP_LOGI("trulight", "Power state: %s", power ? "ON" : "OFF");
        }
      }
      return 0;

# Power state binary sensor - tracks real on/off state from BLE polling
binary_sensor:
  - platform: template
    name: "${friendly_name} Power State"
    id: trulight_power_sensor
    device_class: power
    lambda: |-
      return id(trulight_power_state);

# Poll controller for power state every 30 seconds (B6 = queryDeviceInfo)
interval:
  - interval: 30s
    then:
      - ble_client.ble_write:
          id: trulight_client
          service_uuid: 0000ae00-0000-1000-8000-00805f9b34fb
          characteristic_uuid: 0000ae01-0000-1000-8000-00805f9b34fb
          value: [0xAA, 0xB6, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0xE0]
