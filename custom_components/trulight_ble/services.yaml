set_scene:
  name: Set Scene
  description: Apply a pre-built TruLight scene from the scene library.
  target:
    entity:
      integration: trulight_ble
      domain: light
  fields:
    category:
      name: Category
      description: Scene category.
      required: true
      example: "Christmas 1"
      selector:
        select:
          mode: dropdown
          options:
            - label: "--- Holidays ---"
              value: "_header_holidays"
            - Christmas 1
            - Christmas 2
            - Christmas Advent
            - Halloween 1
            - Halloween 2
            - Halloween 3
            - Easter
            - Valentines Day
            - "St. Patrick's Day"
            - Thanksgiving
            - Happy Holidays
            - Independence Day
            - USA
            - Canada Day
            - Cinco De Mayo
            - Chinese New Year
            - Diwali 1
            - Diwali 2
            - Diwali 3
            - "Mother's Day"
            - Remembrance Day
            - label: "--- Sports ---"
              value: "_header_sports"
            - NFL
            - NBA
            - MLB
            - NHL2
            - CFL
            - College Teams
            - Super Bowl LVI2
            - Olympics 2022
            - label: "--- Seasonal ---"
              value: "_header_seasonal"
            - Spring Colors
            - Summer Colors
            - Autumn Colors
            - Winter Colors
            - Rainbow Colors
            - Downlighting Colors
            - All White Colors
            - label: "--- Effects & Patterns ---"
              value: "_header_effects"
            - Fireworks 1
            - Fireworks 2
            - Fading
            - IsoFade
            - ModeExpo
            - Demo Patterns
            - Motionless
            - Amazing Motionless
            - Amazing-Multi-Brightness
            - Star Twinkle
            - Sway
            - Undualtion
            - Multi Pulse
            - Flame
            - Expanse
            - Spotlight
            - Flicker
            - Extend
            - label: "--- Pop Culture ---"
              value: "_header_popculture"
            - Disney
            - Paw Patrol
            - Star Wars 1
            - Star Wars 2
            - Taste The Rainbow
            - label: "--- Architectural ---"
              value: "_header_architectural"
            - Architectural BW
            - Architectural WW
            - label: "--- Causes ---"
              value: "_header_causes"
            - Ukraine Strong
            - Covid Cause
            - Pride
            - Police Service
            - U.S Military
            - Truth And Reconciliation
            - Human Trafficking Awareness
    scene_name:
      name: Scene Name
      description: Scene name within the category (check logs for available names).
      required: true
      example: "Candycane--static"
      selector:
        text:
    zone:
      name: Zone
      description: "Zone (0=all, 1=Top Roofline, 2=Bottom Roofline, etc.)"
      required: false
      default: 0
      selector:
        select:
          options:
            - label: All Zones
              value: "0"
            - label: "Zone 1 (Top Roofline)"
              value: "1"
            - label: "Zone 2 (Bottom Roofline)"
              value: "2"
            - label: Zone 3
              value: "3"
            - label: Zone 4
              value: "4"
            - label: Zone 5
              value: "5"
            - label: Zone 6
              value: "6"
            - label: Zone 7
              value: "7"
            - label: Zone 8
              value: "8"

send_raw:
  name: Send Raw Command
  description: Send a raw hex command to the TruLight controller (CRC computed automatically by ESP32).
  target:
    entity:
      integration: trulight_ble
      domain: light
  fields:
    hex:
      name: Hex Command
      description: Hex command string without CRC.
      required: true
      example: "AAF7000080B3FF00FF0000000000..."
      selector:
        text:

set_zone:
  name: Set Zone
  description: Control a specific zone independently with its own effect and color.
  target:
    entity:
      integration: trulight_ble
      domain: light
  fields:
    zone:
      name: Zone
      description: Target zone.
      required: true
      selector:
        select:
          options:
            - label: All Zones
              value: "0"
            - label: "Zone 1 (Top Roofline)"
              value: "1"
            - label: "Zone 2 (Bottom Roofline)"
              value: "2"
            - label: Zone 3
              value: "3"
            - label: Zone 4
              value: "4"
            - label: Zone 5
              value: "5"
            - label: Zone 6
              value: "6"
            - label: Zone 7
              value: "7"
            - label: Zone 8
              value: "8"
    effect:
      name: Effect
      description: Animation effect.
      required: false
      default: "Static"
      selector:
        select:
          mode: dropdown
          options:
            - Static
            - Rainbow
            - Chase Color
            - Tricolor Chase
            - Breath
            - Fade
            - Meteor
            - Meteor Smooth
            - Fire 2012
            - Fire Flicker
            - Sparkle
            - Twinkle
            - TwinkleFox
            - Flow
            - Aurora
            - Pacifica
            - Lightning
            - Fireworks
            - Heartbeat
            - Strobe
            - Rainbow Cycle
            - Larson Scanner
            - Sinelon
            - Juggle
            - BPM
            - Dissolve
            - Running Lights
            - Wipe
            - Scan
            - Bouncing Balls
            - Popcorn
    brightness:
      name: Brightness
      description: Brightness (0-255).
      required: false
      default: 255
      selector:
        number:
          min: 0
          max: 255
          mode: slider
    speed:
      name: Speed
      description: Animation speed (0-255).
      required: false
      default: 128
      selector:
        number:
          min: 0
          max: 255
          mode: slider
    direction:
      name: Direction
      description: Animation direction.
      required: false
      default: 0
      selector:
        select:
          options:
            - label: Right
              value: "0"
            - label: Left
              value: "1"
            - label: Center Out
              value: "2"
            - label: Outside In
              value: "3"
            - label: Alternate
              value: "4"
    rgb_color:
      name: Color
      description: RGB color.
      required: false
      default: [255, 255, 255]
      selector:
        color_rgb:

set_leds:
  name: Set Individual LEDs
  description: Set specific LEDs to individual colors (per-pixel addressing).
  target:
    entity:
      integration: trulight_ble
      domain: light
  fields:
    start_led:
      name: Start LED
      description: Starting LED index (0-based).
      required: true
      example: 10
      selector:
        number:
          min: 0
          max: 2000
          mode: box
    leds:
      name: LED Colors
      description: "List of [R, G, B] colors. Example: [[255,0,0], [0,255,0], [0,0,255]]"
      required: true
      example: "[[255,0,0], [0,255,0], [0,0,255]]"
      selector:
        object:

set_params:
  name: Set Speed & Density
  description: Adjust animation speed and density (pixel spacing) and re-apply current effect.
  target:
    entity:
      integration: trulight_ble
      domain: light
  fields:
    speed:
      name: Speed
      description: "Animation speed (0-255). App default: 128 (50%)."
      required: false
      selector:
        number:
          min: 0
          max: 255
          mode: slider
    density:
      name: Density
      description: "Pixel density/width (0-255). Higher = more LEDs lit. App default: 179 (70%)."
      required: false
      selector:
        number:
          min: 0
          max: 255
          mode: slider
